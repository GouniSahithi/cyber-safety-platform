<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Module Levels</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="module-wrapper">

<div class="module-card-box">

<h1 id="moduleTitle">Phishing Awareness</h1>

<p class="module-desc" id="moduleDesc"></p>

<div class="level-list">

<div id="easyBtn" class="level-item" onclick="startLevel('easy')">
<span class="level-icon">🟢</span>
<div>
<h3>Easy Level</h3>
<p>Learn the basic concepts</p>
</div>
</div>

<div id="mediumBtn" class="level-item locked">
<span class="level-icon">🟡</span>
<div>
<h3>Medium Level</h3>
<p>Intermediate cyber safety</p>
</div>
<span class="lock">🔒</span>
</div>

<div id="hardBtn" class="level-item locked">
<span class="level-icon">🔴</span>
<div>
<h3>Hard Level</h3>
<p>Advanced cyber threats</p>
</div>
<span class="lock">🔒</span>
</div>

<div id="finalBtn" class="level-item final locked">
<span class="level-icon">🎓</span>
<div>
<h3>Final Assessment</h3>
<p>Complete course and earn certificate</p>
</div>
<span class="lock">🔒</span>
</div>

</div>

</div>

</div>

<script src="js/module.js"></script>

</body>
</html>
