<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CyberSafety - Select Language</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 30px;
            color: #2c3e50;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0078D4;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #005ea6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Select Language / భాష ఎంచుకోండి / भाषा चुनें</h2>

    <button onclick="setLanguage('en')">English</button>
    <button onclick="setLanguage('te')">తెలుగు</button>
    <button onclick="setLanguage('hi')">हिन्दी</button>
</div>

<script>
    function setLanguage(lang) {
        localStorage.setItem("language", lang);
        window.location.href = "login.html";
    }
</script>

</body>
</html>
